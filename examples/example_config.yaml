blast:
  protein_db: nr
  nucleotide_db: core_nt
  threads: 8
  evalue: 0.05
  max_target_seqs: 50000

filters:
  min_identity: 30
  min_alignment_coverage: 0.7

motif:
  # One-based residue positions in the ungapped 16S rRNA sequence.
  # Each entry in residues is a string of accepted characters at that position
  # (e.g. "ACG" accepts any of A, C, or G).
  positions: [1408, 1409, 1410]
  residues: ["A", "C", "G"]

alignment:
  method: mafft

output:
  results_dir: results

# Optional: specify query files (used by Snakemake)
protein_query: examples/protein_query.fasta
rna_query: examples/small_16s.fasta
